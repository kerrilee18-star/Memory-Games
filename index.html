<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESL Memory Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Andika&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #6c5ce7; --secondary: #00b894; --bg: #f0f3f7; --card-back: #3498db; }
        
        body { 
            background-color: var(--bg); 
            font-family: 'Andika', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            margin: 0; padding: 20px;
        }

        #game-container { width: 100%; max-width: 600px; text-align: center; }
        
        #game-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; background: white; padding: 15px; border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%;
        }

        #game-board { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; 
        }

        .card { 
            aspect-ratio: 1/1; background: var(--card-back); border-radius: 12px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            transition: transform 0.4s; position: relative; transform-style: preserve-3d;
        }

        .card-content { display: none; flex-direction: column; align-items: center; }
        .card.flipped { background: white; transform: rotateY(180deg); border: 3px solid var(--primary); }
        .card.flipped .card-content { display: flex; transform: rotateY(180deg); }
        .card.matched { background: #f0fff4 !important; border-color: var(--secondary) !important; opacity: 0.5; cursor: default; }

        .emoji { font-size: 2.5rem; }
        .word { font-size: 1rem; color: #2d3436; margin-top: 5px; font-weight: bold; }
        .color-swatch { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #ddd; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .menu-btn { 
            padding: 25px 10px; border: none; border-radius: 15px; background: white; 
            font-family: inherit; font-size: 1.1rem; cursor: pointer; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }

        .overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; 
        }
        .modal { 
            background: white; padding: 30px; border-radius: 25px; 
            width: 90%; max-width: 450px; text-align: center; max-height: 90vh; overflow-y: auto;
        }

        .vocab-table { width: 100%; margin: 20px 0; border-collapse: collapse; }
        .vocab-table td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        .audio-btn { cursor: pointer; background: #f0f0f0; border: none; border-radius: 50%; width: 35px; height: 35px; font-size: 1.1rem; }

        button.action-btn { 
            background: var(--primary); color: white; padding: 15px 30px; 
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="main-menu" class="screen">
        <h1 style="color: var(--primary);">Great Job!</h1>
        <div class="menu-grid">
            <button class="menu-btn" onclick="startGame('emotions')"><b>Emotions</b><br>רְגָשׁוֹת</button>
            <button class="menu-btn" onclick="startGame('sport')"><b>Sport</b><br>סְפּוֹרְט</button>
            <button class="menu-btn" onclick="startGame('body')"><b>Body Parts</b><br>חֶלְקֵי גּוּף</button>
            <button class="menu-btn" onclick="startGame('animals')"><b>Animals</b><br>חַיּוֹת</button>
            <button class="menu-btn" onclick="startGame('colors')"><b>Colors</b><br>צְבָעִים</button>
            <button class="menu-btn" onclick="startGame('school')"><b>School</b><br>בֵּית סֵפֶר</button>
        </div>
    </div>

    <div id="game-area" class="screen" style="display:none;">
        <div id="game-header">
            <button onclick="location.reload()">MENU</button>
            <button onclick="showHint()" style="background:#fff3bf; border:none; border-radius:5px; padding:5px 10px; cursor:pointer;">HINT</button>
            <div style="font-weight: bold; color: var(--primary);">
                TIME: <span id="timer">0</span> | SCORE: <span id="score">0</span>/<span id="total-pairs">0</span>
            </div>
            <button id="mute-btn" onclick="toggleMute()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">🔊</button>
        </div>
        <div id="game-board"></div>
    </div>

    <div id="win-screen" class="overlay">
        <div class="modal">
            <h1 style="color: var(--secondary);">Great Job!</h1>
            <table class="vocab-table" id="review-list"></table>
            <button class="action-btn" onclick="location.reload()">Back to Menu</button>
        </div>
    </div>

    <script>
        const vocab = {
            emotions: [
                {en:'happy', hb:'שָׂמֵחַ', val:'😀'}, {en:'excited', hb:'נִרְגָּשׁ', val:'😆'}, {en:'sad', hb:'עָצוּב', val:'☹️'}, 
                {en:'tired', hb:'עָיֵף', val:'🥱'}, {en:'sick', hb:'חוֹלֶה', val:'🤒'}, {en:'angry', hb:'כּוֹעֵס', val:'😡'}, 
                {en:'scared', hb:'מְפֻחָד', val:'😳'}, {en:'surprised', hb:'מֻפְתָּע', val:'😧'}
            ],
            sport: [
                {en:'baseball', hb:'בֵּיְסְבּוֹל', val:'⚾'}, {en:'basketball', hb:'כַּדּוּרְסַל', val:'🏀'}, {en:'soccer', hb:'כַּדּוּרֶגֶל', val:'⚽'}, 
                {en:'football', hb:'פּוּטְבּוֹל', val:'🏈'}, {en:'tennis', hb:'טֶנִיס', val:'🎾'}, {en:'ping pong', hb:'פִּינְג פּוֹנְג', val:'🏓'}
            ],
            body: [
                {en:'eyes', hb:'עֵינַיִם', val:'👀'}, {en:'ears', hb:'אָזְנַיִם', val:'👂'}, {en:'nose', hb:'אַף', val:'👃'}, 
                {en:'hands', hb:'יָדַיִם', val:'🙌'}, {en:'feet', hb:'כַּפּוֹת רַגְלַיִם', val:'🦶'}, {en:'legs', hb:'רַגְלַיִם', val:'🦵'}, 
                {en:'arms', hb:'זְרוֹעוֹת', val:'💪'}, {en:'tooth', hb:'שֵׁן', val:'🦷'}, {en:'tongue', hb:'לָשׁוֹן', val:'👅'}, {en:'brain', hb:'מוֹחַ', val:'🧠'}
            ],
            colors: [
                {en:'blue', hb:'כָּחֹל', val:'#0984e3', type:'color'}, {en:'red', hb:'אָדֹם', val:'#d63031', type:'color'}, {en:'green', hb:'יָרֹק', val:'#27ae60', type:'color'}, 
                {en:'yellow', hb:'צָהֹב', val:'#f1c40f', type:'color'}, {en:'brown', hb:'חוּם', val:'#964B00', type:'color'}, {en:'black', hb:'שָׁחֹר', val:'#000000', type:'color'}
            ],
            animals: [{en:'dog', hb:'כֶּלֶב', val:'🐶'}, {en:'cat', hb:'חָתוּל', val:'🐱'}, {en:'lion', hb:'אַרְיֵה', val:'🦁'}, {en:'cow', hb:'פָּרָה', val:'🐮'}],
            school: [{en:'pencil', hb:'עִפָּרוֹן', val:'✏️'}, {en:'book', hb:'סֵפֶר', val:'📖'}, {en:'bag', hb:'יַלְקוּט', val:'🎒'}]
        };

        let currentCat = [];
        let flipped = [];
        let matches = 0;
        let timer = 0;
        let timerInterval;
        let isMuted = false;
        let canPlay = true;

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('mute-btn').innerText = isMuted ? '🔇' : '🔊';
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }

        function startGame(catKey) {
            currentCat = vocab[catKey];
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            setupBoard();
            timerInterval = setInterval(() => {
                timer++;
                document.getElementById('timer').innerText = timer;
            }, 1000);
        }

        function setupBoard() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            matches = 0;
            timer = 0;
            document.getElementById('total-pairs').innerText = currentCat.length;
            const gameCards = [...currentCat, ...currentCat].sort(() => Math.random() - 0.5);
            gameCards.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.name = item.en;
                card.innerHTML = `<div class="card-content">
                    ${item.type === 'color' ? `<div class="color-swatch" style="background:${item.val}"></div>` : `<span class="emoji">${item.val}</span>`}
                    <span class="word">${item.en}</span>
                </div>`;
                card.onclick = () => flipCard(card);
                board.appendChild(card);
            });
        }

        function flipCard(card) {
            if (!canPlay || card.classList.contains('flipped') || card.classList.contains('matched')) return;
            card.classList.add('flipped');
            if (!isMuted) speak(card.dataset.name);
            flipped.push(card);
            if (flipped.length === 2) { canPlay = false; checkMatch(); }
        }

        function checkMatch() {
            const [c1, c2] = flipped;
            if (c1.dataset.name === c2.dataset.name) {
                setTimeout(() => {
                    c1.classList.add('matched'); c2.classList.add('matched');
                    matches++; document.getElementById('score').innerText = matches;
                    flipped = []; canPlay = true;
                    if (matches === currentCat.length) endGame();
                }, 500);
            } else {
                setTimeout(() => { c1.classList.remove('flipped'); c2.classList.remove('flipped'); flipped = []; canPlay = true; }, 1000);
            }
        }

        function showHint() {
            if (!canPlay) return;
            const unMatched = document.querySelectorAll('.card:not(.matched)');
            unMatched.forEach(c => c.classList.add('flipped'));
            setTimeout(() => { unMatched.forEach(c => c.classList.remove('flipped')); }, 1500);
        }

        function endGame() {
            clearInterval(timerInterval);
            const list = document.getElementById('review-list');
            list.innerHTML = '';
            currentCat.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.type === 'color' ? `<div class="color-swatch" style="width:30px;height:30px;background:${item.val}"></div>` : item.val}</td>
                    <td><b>${item.en}</b></td>
                    <td style="text-align:right">${item.hb}</td>
                    <td><button class="audio-btn" onclick="speak('${item.en}')">🔊</button></td>
                `;
                list.appendChild(row);
            });
            document.getElementById('win-screen').style.display = 'flex';
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    </script>
</body>
</html>
