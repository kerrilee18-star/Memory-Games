<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ESL Memory Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Andika&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #6c5ce7; --secondary: #00b894; --bg: #f0f3f7; --card-back: #3498db; }
        
        /* iPhone Jump/Zoom Prevention */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; 
        }
        
        html, body { overflow: hidden; height: 100%; width: 100%; position: fixed; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Andika', 'Comic Sans MS', cursive, sans-serif; 
            background-color: var(--bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .screen { width: 100%; max-width: 500px; text-align: center; display: flex; flex-direction: column; align-items: center; height: 100%; padding: 10px; }
        
        .instruction-box { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin: 10px auto; width: 90%; border-top: 4px solid var(--primary); }
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; margin-top: 10px; }
        .lvl-btn { padding: 20px 5px; border: none; border-radius: 20px; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.08); cursor: pointer; font-family: inherit; }
        .lvl-btn b { color: var(--primary); font-size: 1.1rem; display: block; }

        #game-header { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 8px; background: white; border-radius: 15px; margin-bottom: 10px; }
        
        #game-board { 
            display: grid;
            gap: 8px;
            width: 100%;
            flex-grow: 1;
            padding-bottom: 20px;
        }

        .card { 
            width: 100%;
            height: 100%;
            aspect-ratio: 1/1; 
            background: var(--card-back); 
            border-radius: 12px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: transform 0.4s; 
            position: relative; 
            transform-style: preserve-3d;
        }

        .card .content { display: none; flex-direction: column; align-items: center; width: 100%; pointer-events: none; }
        .card.flipped { background: white; transform: rotateY(180deg); border: 2.5px solid var(--primary); }
        .card.flipped .content { display: flex; transform: rotateY(180deg); }
        .card.matched { background: #f0fff4 !important; border-color: var(--secondary) !important; opacity: 0.6; }

        .emoji { font-size: clamp(1.2rem, 7vw, 2.3rem); }
        /* English School Font Style */
        .word { 
            font-size: 0.85rem; 
            font-weight: 400; 
            margin-top: 2px; 
            color: #2d3436; 
            font-family: 'Andika', sans-serif;
        }

        .visual-box { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; }
        .color-swatch { width: 30px; height: 30px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); }
        .gold-metallic { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); }

        .shape-draw { width: 30px; height: 30px; }
        .shape-circle { border-radius: 50%; }
        .shape-rectangle { width: 34px; height: 20px; }
        .shape-triangle { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 28px solid black; background: none !important; }
        .shape-oval { width: 36px; height: 24px; border-radius: 50%; }

        .stats { display: flex; gap: 4px; }
        .stat-box { background: #f8f9fa; padding: 2px 4px; border-radius: 8px; min-width: 55px; }
        .stat-label { font-size: 0.45rem; color: #718096; display: block; font-weight: bold; }
        .stat-value { font-size: 0.8rem; color: var(--primary); font-weight: 800; }

        .nav-btn { padding: 8px; border: none; border-radius: 12px; cursor: pointer; font-weight: 800; font-size: 0.6rem; font-family: inherit; }
        .back-btn { background: #edf2f7; color: #4a5568; }
        .hint-btn { background: #fef3c7; color: #92400e; }
        .mute-btn { background: #e2e8f0; font-size: 1rem; padding: 6px; border-radius: 10px; border: none; cursor: pointer; }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 15px; }
        .pop-box { background: white; padding: 25px; border-radius: 25px; text-align: center; width: 100%; max-width: 400px; max-height: 85vh; overflow-y: auto; }
        .primary-btn { background: var(--primary); color: white; width: 100%; padding: 16px; border: none; border-radius: 15px; font-size: 1.2rem; font-weight: 800; cursor: pointer; margin-top: 10px; font-family: inherit; }

        .vocab-list { width: 100%; border-collapse: collapse; text-align: right; margin: 15px 0; border-top: 2px solid var(--primary); }
        .vocab-list td { padding: 10px 5px; border-bottom: 1px solid #eee; font-size: 1.1rem; }
        .eng { font-weight: 400; text-align: left; color: var(--primary); font-family: 'Andika', sans-serif; }
    </style>
</head>
<body>

    <div id="main-menu" class="screen">
        <h1>🧠 Memory Game</h1>
        <div class="instruction-box">
            <p>Click the tiles to match two of a kind. How fast can you do it?</p>
            <p dir="rtl" style="font-weight: 600;">לחצו על האריחים כדי להתאים שניים מאותו סוג. כמה מהר תוכלו לעשות זאת?</p>
        </div>
        <div class="menu-grid">
            <button class="lvl-btn" onclick="startGame('Animals', 'animals')"><b>Animals</b> חיות</button>
            <button class="lvl-btn" onclick="startGame('Shapes', 'shapes')"><b>Shapes</b> צורות</button>
            <button class="lvl-btn" onclick="startGame('School', 'school')"><b>School</b> בית ספר</button>
            <button class="lvl-btn" onclick="startGame('Colors', 'colors')"><b>Colors</b> צבעים</button>
            <button class="lvl-btn" onclick="startGame('Numbers', 'numbers')"><b>Numbers</b> מספרים</button>
        </div>
    </div>

    <div id="game-screen" class="screen" style="display:none;">
        <div id="game-header">
            <button class="nav-btn back-btn" onclick="showMenu()">MENU<br>תפריט</button>
            <div class="stats">
                <div class="stat-box"><span class="stat-label">TIME</span><span id="timer" class="stat-value">0</span></div>
                <div class="stat-box"><span class="stat-label">BEST</span><span id="best-score" class="stat-value">--</span></div>
                <div class="stat-box"><span class="stat-label">SCORE</span><span class="stat-value"><span id="score">0</span>/<span id="total-pairs">0</span></span></div>
            </div>
            <div style="display:flex; align-items:center; gap:4px;">
                <button class="nav-btn hint-btn" onclick="useHint()">HINT<br>רמז</button>
                <button class="mute-btn" id="mute-toggle" onclick="toggleMute()">🔊</button>
            </div>
        </div>
        <div id="game-board"></div>
    </div>

    <div id="start-overlay" class="overlay">
        <div class="pop-box">
            <h2 id="lvl-title">Category</h2>
            <button class="primary-btn" onclick="beginTimer()">START! / התחל!</button>
        </div>
    </div>

    <div id="win-overlay" class="overlay">
        <div class="pop-box">
            <h2 style="color: var(--secondary); margin:0;">WELL DONE!</h2>
            <p>Time: <b><span id="final-time">0</span>s</b></p>
            <h3 style="margin: 15px 0 5px 0;">Vocabulary Review</h3>
            <table class="vocab-list" id="vocab-table"></table>
            <button class="primary-btn" style="background:var(--secondary);" onclick="resetGame()">PLAY AGAIN</button>
            <button class="primary-btn" style="background:#edf2f7; color:#4a5568; font-size:1rem;" onclick="showMenu()">BACK TO MENU</button>
        </div>
    </div>

    <script>
        const categories = {
            animals: [
                {name:'Dog', heb:'כלב', val:'🐶', type:'emoji'}, {name:'Cat', heb:'חתול', val:'🐱', type:'emoji'}, {name:'Mouse', heb:'עכבר', val:'🐭', type:'emoji'}, 
                {name:'Rabbit', heb:'ארנב', val:'🐰', type:'emoji'}, {name:'Lion', heb:'אריה', val:'🦁', type:'emoji'}, {name:'Cow', heb:'פרה', val:'🐮', type:'emoji'}, 
                {name:'Penguin', heb:'פינגווין', val:'🐧', type:'emoji'}, {name:'Frog', heb:'צפרדע', val:'🐸', type:'emoji'}, {name:'Monkey', heb:'קוף', val:'🐵', type:'emoji'}, 
                {name:'Tiger', heb:'נמר', val:'🐯', type:'emoji'}
            ],
            shapes: [
                {name:'Circle', heb:'עיגול', val:'shape-circle', type:'shape', color:'#e74c3c'}, {name:'Square', heb:'ריבוע', val:'shape-square', type:'shape', color:'#3498db'}, 
                {name:'Star', heb:'כוכב', val:'★', type:'text-shape', color:'#f1c40f'}, {name:'Heart', heb:'לב', val:'♥', type:'text-shape', color:'#fd79a8'}, 
                {name:'Diamond', heb:'מעוין', val:'◆', type:'text-shape', color:'#9b59b6'}, {name:'Rectangle', heb:'מלבן', val:'shape-rectangle', type:'shape', color:'#2ecc71'}, 
                {name:'Triangle', heb:'משולש', val:'shape-triangle', type:'shape', color:'#e67e22'}, {name:'Oval', heb:'אליפסה', val:'shape-oval', type:'shape', color:'#7f8c8d'}
            ],
            school: [
                {name:'Crayon', heb:'צבע', val:'🖍️', type:'emoji'}, {name:'Pencil', heb:'עיפרון', val:'✏️', type:'emoji'}, {name:'Pen', heb:'עט', val:'🖊️', type:'emoji'}, 
                {name:'Scissors', heb:'מספריים', val:'✂️', type:'emoji'}, {name:'Ruler', heb:'סרגל', val:'📏', type:'emoji'}, {name:'Book', heb:'ספר', val:'📖', type:'emoji'}, 
                {name:'Notebook', heb:'מחברת', val:'📓', type:'emoji'}, {name:'School bag', heb:'ילקוט', val:'🎒', type:'emoji'}
            ],
            colors: [
                {name:'Blue', heb:'כחול', val:'#0984e3', type:'color'}, {name:'Red', heb:'אדום', val:'#d63031', type:'color'}, {name:'Green', heb:'ירוק', val:'#27ae60', type:'color'}, 
                {name:'Orange', heb:'כתום', val:'#e67e22', type:'color'}, {name:'Pink', heb:'ורוד', val:'#fd79a8', type:'color'}, {name:'Purple', heb:'סגול', val:'#6c5ce7', type:'color'}, 
                {name:'Black', heb:'שחור', val:'#2d3436', type:'color'}, {name:'White', heb:'לבן', val:'#ffffff', type:'color'}, {name:'Gray', heb:'אפור', val:'#7f8c8d', type:'color'}, 
                {name:'Yellow', heb:'צהוב', val:'#f1c40f', type:'color'}, {name:'Brown', heb:'חום', val:'#CD853F', type:'color'}, {name:'Gold', heb:'זהב', val:'gold-metallic', type:'special-color'}
            ],
            numbers: [
                {name:'One', heb:'אחת', val:'1', type:'num'}, {name:'Two', heb:'שתיים', val:'2', type:'num'}, {name:'Three', heb:'שלוש', val:'3', type:'num'}, {name:'Four', heb:'ארבע', val:'4', type:'num'}, 
                {name:'Five', heb:'חמש', val:'5', type:'num'}, {name:'Six', heb:'שש', val:'6', type:'num'}, {name:'Seven', heb:'שבע', val:'7', type:'num'}, {name:'Eight', heb:'שמונה', val:'8', type:'num'},
                {name:'Nine', heb:'תשע', val:'9', type:'num'}, {name:'Ten', heb:'עשר', val:'10', type:'num'}
            ]
        };

        let currentCatKey = 'animals', flippedCards = [], matchedPairs = 0, seconds = 0, timerInterval, canFlip = false, isMuted = false;

        function toggleMute() { isMuted = !isMuted; document.getElementById('mute-toggle').innerText = isMuted ? '🔇' : '🔊'; }
        function speak(text) { if (isMuted) return; window.speechSynthesis.cancel(); const msg = new SpeechSynthesisUtterance(text); msg.lang = 'en-US'; window.speechSynthesis.speak(msg); }
        function showMenu() { location.reload(); }

        function startGame(label, key) { 
            currentCatKey = key;
            document.getElementById('main-menu').style.display = 'none'; 
            document.getElementById('game-screen').style.display = 'flex'; 
            document.getElementById('lvl-title').innerText = label;
            document.getElementById('start-overlay').style.display = 'flex';
            setupBoard();
        }

        function setupBoard() {
            const data = categories[currentCatKey];
            const board = document.getElementById('game-board');
            
            // Balanced Grid Logic
            const total = data.length * 2;
            let cols = 4;
            board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

            board.innerHTML = '';
            matchedPairs = 0; seconds = 0; flippedCards = [];
            document.getElementById('score').innerText = '0';
            document.getElementById('total-pairs').innerText = data.length;
            document.getElementById('timer').innerText = '0';
            
            const cardsData = [...data, ...data].sort(() => Math.random() - 0.5);
            cardsData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.name = item.name;
                
                let visual = '';
                if(item.type === 'color') visual = `<div class="color-swatch" style="background:${item.val}"></div>`;
                else if(item.type === 'special-color') visual = `<div class="color-swatch ${item.val}"></div>`;
                else if(item.type === 'shape') {
                    const style = item.val === 'shape-triangle' ? `border-bottom-color:${item.color}` : `background:${item.color}`;
                    visual = `<div class="shape-draw ${item.val}" style="${style}"></div>`;
                }
                else if(item.type === 'text-shape') visual = `<span style="font-size:1.8rem; color:${item.color}">${item.val}</span>`;
                else if(item.type === 'num') visual = `<span style="font-size:1.8rem; font-weight:bold; color:#2d3436;">${item.val}</span>`;
                else visual = `<span class="emoji">${item.val}</span>`;

                card.innerHTML = `<div class="content"><div class="visual-box">${visual}</div><span class="word">${item.name}</span></div>`;
                card.onclick = () => flipCard(card, item.name);
                board.appendChild(card);
            });
        }

        function beginTimer() { document.getElementById('start-overlay').style.display = 'none'; canFlip = true; timerInterval = setInterval(() => { seconds++; document.getElementById('timer').innerText = seconds; }, 1000); }

        function flipCard(card, name) {
            if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) return;
            card.classList.add('flipped');
            flippedCards.push(card);
            speak(name);
            if (flippedCards.length === 2) { canFlip = false; checkMatch(); }
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            if (c1.dataset.name === c2.dataset.name) {
                c1.classList.add('matched'); c2.classList.add('matched');
                matchedPairs++;
                document.getElementById('score').innerText = matchedPairs;
                flippedCards = []; canFlip = true;
                if (matchedPairs === categories[currentCatKey].length) { 
                    clearInterval(timerInterval); 
                    setTimeout(showWin, 600);
                }
            } else { setTimeout(() => { c1.classList.remove('flipped'); c2.classList.remove('flipped'); flippedCards = []; canFlip = true; }, 800); }
        }

        function showWin() {
            const table = document.getElementById('vocab-table');
            table.innerHTML = '';
            categories[currentCatKey].forEach(item => {
                table.innerHTML += `<tr><td class="eng">${item.name}</td><td>${item.heb}</td></tr>`;
            });
            document.getElementById('final-time').innerText = seconds;
            document.getElementById('win-overlay').style.display = 'flex';
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        function resetGame() { document.getElementById('win-overlay').style.display = 'none'; setupBoard(); beginTimer(); }
        function useHint() {
            if (!canFlip) return;
            seconds += 5; document.getElementById('timer').innerText = seconds;
            const hidden = Array.from(document.querySelectorAll('.card:not(.flipped):not(.matched)'));
            const names = [...new Set(hidden.map(c => c.dataset.name))].sort(() => 0.5 - Math.random()).slice(0, 1);
            const cards = hidden.filter(c => names.includes(c.dataset.name));
            canFlip = false; cards.forEach(c => c.classList.add('flipped'));
            setTimeout(() => { cards.forEach(c => c.classList.remove('flipped')); canFlip = true; }, 1000);
        }
    </script>
</body>
</html>
