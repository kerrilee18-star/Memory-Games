<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESL Memory Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Andika&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #6c5ce7; --secondary: #00b894; --bg: #f0f3f7; --card-back: #3498db; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg); font-family: 'Andika', sans-serif; margin: 0; padding: 20px; }

        .screen { width: 100%; max-width: 600px; margin: 0 auto; text-align: center; }
        
        #game-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; background: white; padding: 15px; border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        #game-board { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; 
        }

        .card { 
            aspect-ratio: 1/1; background: var(--card-back); border-radius: 12px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            transition: transform 0.4s; position: relative; transform-style: preserve-3d;
        }

        .card .content { display: none; flex-direction: column; align-items: center; justify-content: center; }
        .card.flipped { background: white; transform: rotateY(180deg); border: 3px solid var(--primary); }
        .card.flipped .content { display: flex; transform: rotateY(180deg); }
        .card.matched { background: #f0fff4 !important; border-color: var(--secondary) !important; opacity: 0.4; }

        .emoji { font-size: 2.5rem; }
        .word { font-size: 1rem; color: #2d3436; margin-top: 5px; }
        .color-swatch { width: 50px; height: 50px; border-radius: 50%; border: 1px solid #ddd; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .lvl-btn { padding: 20px; border: none; border-radius: 15px; background: white; font-family: inherit; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .stat-box { background: #f8f9fa; padding: 5px 10px; border-radius: 8px; text-align: center; }
        .stat-label { font-size: 0.7rem; display: block; color: #666; font-weight: bold; }
        
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; }
        .pop-box { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        .primary-btn { background: var(--primary); color: white; width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; margin-top: 15px; cursor: pointer; }

        .vocab-list { width: 100%; margin-top: 20px; border-collapse: collapse; }
        .vocab-list td { padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="main-menu" class="screen">
        <h1>Great Job!</h1>
        <p>Choose a category</p>
        <div class="menu-grid">
            <button class="lvl-btn" onclick="startGame('emotions')">Emotions<br>רְגָשׁוֹת</button>
            <button class="lvl-btn" onclick="startGame('sport')">Sport<br>סְפּוֹרְט</button>
            <button class="lvl-btn" onclick="startGame('body')">Body Parts<br>חֶלְקֵי גּוּף</button>
            <button class="lvl-btn" onclick="startGame('animals')">Animals<br>חַיּוֹת</button>
            <button class="lvl-btn" onclick="startGame('colors')">Colors<br>צְבָעִים</button>
            <button class="lvl-btn" onclick="startGame('school')">School<br>בֵּית סֵפֶר</button>
        </div>
    </div>

    <div id="game-screen" class="screen" style="display:none;">
        <div id="game-header">
            <button onclick="location.reload()">MENU</button>
            <button onclick="showHint()">HINT</button>
            <div class="stat-box"><span class="stat-label">TIME</span><span id="timer">0</span></div>
            <div class="stat-box"><span class="stat-label">SCORE</span><span id="score">0</span>/<span id="total-pairs">0</span></div>
            <button id="mute-toggle" onclick="toggleMute()">🔊</button>
        </div>
        <div id="game-board"></div>
    </div>

    <div id="win-overlay" class="overlay">
        <div class="pop-box">
            <h1 style="color: var(--secondary);">Great Job!</h1>
            <table class="vocab-list" id="vocab-table"></table>
            <button class="primary-btn" onclick="resetGame()">Play Again</button>
            <button class="primary-btn" style="background:#ddd; color:#333;" onclick="location.reload()">Main Menu</button>
        </div>
    </div>

    <script>
        const categories = {
            emotions: [
                {name:'happy', heb:'שָׂמֵחַ', val:'😀'}, {name:'excited', heb:'נִרְגָּשׁ', val:'😆'}, {name:'sad', heb:'עָצוּב', val:'☹️'}, 
                {name:'tired', heb:'עָיֵף', val:'🥱'}, {name:'sick', heb:'חוֹלֶה', val:'🤒'}, {name:'angry', heb:'כּוֹעֵס', val:'😡'}, 
                {name:'scared', heb:'מְפֻחָד', val:'😳'}, {name:'surprised', heb:'מֻפְתָּע', val:'😧'}
            ],
            sport: [
                {name:'baseball', heb:'בֵּיְסְבּוֹל', val:'⚾'}, {name:'basketball', heb:'כַּדּוּרְסַל', val:'🏀'}, {name:'soccer', heb:'כַּדּוּרֶגֶל', val:'⚽'}, 
                {name:'football', heb:'פּוּטְבּוֹל', val:'🏈'}, {name:'tennis', heb:'טֶנִיס', val:'🎾'}, {name:'ping pong', heb:'פִּינְג פּוֹנְג', val:'🏓'}
            ],
            body: [
                {name:'eyes', heb:'עֵינַיִם', val:'👀'}, {name:'ears', heb:'אָזְנַיִם', val:'👂'}, {name:'nose', heb:'אַף', val:'👃'}, 
                {name:'hands', heb:'יָדַיִם', val:'🙌'}, {name:'feet', heb:'כַּפּוֹת רַגְלַיִם', val:'🦶'}, {name:'legs', heb:'רַגְלַיִם', val:'🦵'}, 
                {name:'arms', heb:'זְרוֹעוֹת', val:'💪'}, {name:'tooth', heb:'שֵׁן', val:'🦷'}, {name:'tongue', heb:'לָשׁוֹן', val:'👅'}, {name:'brain', heb:'מוֹחַ', val:'🧠'}
            ],
            colors: [
                {name:'blue', heb:'כָּחֹל', val:'#0984e3', type:'color'}, {name:'red', heb:'אָדֹם', val:'#d63031', type:'color'}, {name:'green', heb:'יָרֹק', val:'#27ae60', type:'color'}, 
                {name:'yellow', heb:'צָהֹב', val:'#f1c40f', type:'color'}, {name:'brown', heb:'חוּם', val:'#964B00', type:'color'}, {name:'black', heb:'שָׁחֹר', val:'#000000', type:'color'}
            ],
            animals: [{name:'dog', heb:'כֶּלֶב', val:'🐶'}, {name:'cat', heb:'חָתוּל', val:'🐱'}, {name:'lion', heb:'אַרְיֵה', val:'🦁'}, {name:'cow', heb:'פָּרָה', val:'🐮'}],
            school: [{name:'pencil', heb:'עִפָּרוֹן', val:'✏️'}, {name:'book', heb:'סֵפֶר', val:'📖'}, {name:'bag', heb:'יַלְקוּט', val:'🎒'}]
        };

        let currentCatKey = 'animals', flippedCards = [], matchedPairs = 0, seconds = 0, timerInterval, canFlip = false, isMuted = false;

        function toggleMute() { isMuted = !isMuted; document.getElementById('mute-toggle').innerText = isMuted ? '🔇' : '🔊'; }
        function speak(text) { if (isMuted) return; window.speechSynthesis.cancel(); const msg = new SpeechSynthesisUtterance(text); msg.lang = 'en-US'; window.speechSynthesis.speak(msg); }

        function startGame(key) { 
            currentCatKey = key;
            document.getElementById('main-menu').style.display = 'none'; 
            document.getElementById('game-screen').style.display = 'block'; 
            setupBoard();
            canFlip = true;
            timerInterval = setInterval(() => { seconds++; document.getElementById('timer').innerText = seconds; }, 1000);
        }

        function setupBoard() {
            const data = categories[currentCatKey];
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            matchedPairs = 0; seconds = 0; flippedCards = [];
            document.getElementById('score').innerText = '0';
            document.getElementById('total-pairs').innerText = data.length;
            const cardsData = [...data, ...data].sort(() => Math.random() - 0.5);
            cardsData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.name = item.name;
                card.innerHTML = `<div class="content"><div>${getVisualHTML(item)}</div><span class="word">${item.name}</span></div>`;
                card.onclick = () => flipCard(card, item.name);
                board.appendChild(card);
            });
        }

        function getVisualHTML(item) {
            if(item.type === 'color') return `<div class="color-swatch" style="background:${item.val}"></div>`;
            return `<span class="emoji">${item.val}</span>`;
        }

        function showHint() {
            if (!canFlip) return;
            canFlip = false;
            const cards = document.querySelectorAll('.card:not(.matched)');
            cards.forEach(c => c.classList.add('flipped'));
            setTimeout(() => { cards.forEach(c => c.classList.remove('flipped')); canFlip = true; }, 1200);
        }

        function flipCard(card, name) {
            if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) return;
            card.classList.add('flipped'); flippedCards.push(card); speak(name);
            if (flippedCards.length === 2) { canFlip = false; checkMatch(); }
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            if (c1.dataset.name === c2.dataset.name) {
                setTimeout(() => {
                    c1.classList.add('matched'); c2.classList.add('matched');
                    matchedPairs++; document.getElementById('score').innerText = matchedPairs;
                    flippedCards = []; canFlip = true;
                    if (matchedPairs === categories[currentCatKey].length) { clearInterval(timerInterval); showWin(); }
                }, 400);
            } else { 
                setTimeout(() => { c1.classList.remove('flipped'); c2.classList.remove('flipped'); flippedCards = []; canFlip = true; }, 1000); 
            }
        }

        function showWin() {
            const table = document.getElementById('vocab-table');
            table.innerHTML = '';
            categories[currentCatKey].forEach(item => {
                table.innerHTML += `<tr><td>${getVisualHTML(item)}</td><td style="text-align:left;"><b>${item.name}</b></td><td style="text-align:right;">${item.heb}</td></tr>`;
            });
            document.getElementById('win-overlay').style.display = 'flex';
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        function resetGame() { document.getElementById('win-overlay').style.display = 'none'; setupBoard(); canFlip = true; timerInterval = setInterval(() => { seconds++; document.getElementById('timer').innerText = seconds; }, 1000); }
    </script>
</body>
</html>
