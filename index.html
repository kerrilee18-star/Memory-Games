<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ESL Hebrew Memory & Practice</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #6c5ce7; --secondary: #00b894; --bg: #f0f3f7; --card-back: #3498db; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        html, body { overflow-x: hidden; height: 100%; width: 100%; margin: 0; padding: 0; background-color: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; }
        
        .screen { width: 100%; max-width: 600px; margin: 0 auto; text-align: center; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 15px 10px; }
        .instruction-box { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin: 10px auto; width: 90%; border-top: 4px solid var(--primary); }
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; margin-top: 10px; }
        .lvl-btn { padding: 20px 10px; border: none; border-radius: 20px; background: white; box-shadow: 0 6px 12px rgba(0,0,0,0.08); cursor: pointer; }
        .lvl-btn b { color: var(--primary); font-size: 1.2rem; display: block; margin-bottom: 4px; }

        #game-header { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 8px 12px; background: white; border-radius: 18px; margin-bottom: 10px; }
        #game-board { display: grid; gap: 8px; width: 100%; padding: 5px; justify-content: center; grid-template-columns: repeat(4, 1fr); }

        .card { aspect-ratio: 1/1; background: var(--card-back); border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.4s; position: relative; transform-style: preserve-3d; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card .content { display: none; flex-direction: column; align-items: center; width: 100%; pointer-events: none; }
        .card.flipped { background: white; transform: rotateY(180deg); border: 2.5px solid var(--primary); }
        .card.flipped .content { display: flex; transform: rotateY(180deg); }
        .card.matched { background: #f0fff4 !important; border-color: var(--secondary) !important; opacity: 0.8; }

        .emoji { font-size: clamp(1.6rem, 8vw, 2.5rem); }
        .word { font-size: 0.8rem; font-weight: 900; margin-top: 5px; text-transform: uppercase; color: #2d3436; }
        .visual-box { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }
        .color-swatch { width: 38px; height: 38px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); }
        .gold-metallic { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); }

        /* Practice List Styles */
        #practice-list { display: none; width: 100%; background: white; border-radius: 25px; padding: 20px; margin-top: 20px; text-align: left; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .vocab-item { display: grid; grid-template-columns: 50px 1fr 1fr 40px; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; gap: 10px; }
        .vocab-item:last-child { border-bottom: none; }
        .vocab-en { font-weight: 800; color: var(--primary); }
        .vocab-he { font-family: 'Arial', sans-serif; font-size: 1.1rem; text-align: right; font-weight: 600; }
        .audio-btn { background: #e2e8f0; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-size: 1rem; }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .pop-box { background: white; padding: 30px; border-radius: 25px; text-align: center; width: 100%; max-width: 400px; }
        .primary-btn { background: var(--primary); color: white; width: 100%; padding: 15px; border: none; border-radius: 15px; font-size: 1.2rem; font-weight: 800; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="main-menu" class="screen">
        <h1>🧠 Memory & Practice</h1>
        <div class="instruction-box">
            <p>Match the pairs to unlock the practice list!</p>
            <p dir="rtl" style="font-weight: 600;">התאימו את הזוגות כדי לפתוח את רשימת התרגול!</p>
        </div>
        <div class="menu-grid">
            <button class="lvl-btn" onclick="startGame('Colors', 'colors')"><b>Colors</b> צְבָעִים</button>
            <button class="lvl-btn" onclick="startGame('Shapes', 'shapes')"><b>Shapes</b> צוּרוֹת</button>
            <button class="lvl-btn" onclick="startGame('Animals', 'animals')"><b>Animals</b> חַיּוֹת</button>
            <button class="lvl-btn" onclick="startGame('Numbers', 'numbers')"><b>Numbers</b> מִסְפָּרִים</button>
        </div>
    </div>

    <div id="game-screen" class="screen" style="display:none;">
        <div id="game-header">
            <button class="primary-btn" style="margin:0; padding:8px 12px; font-size:0.7rem;" onclick="location.reload()">MENU</button>
            <div id="score-display" style="font-weight:800; color:var(--primary);">Matched: <span id="score">0</span>/<span id="total">0</span></div>
            <button id="mute-btn" class="audio-btn" onclick="toggleMute()">🔊</button>
        </div>
        <div id="game-board"></div>

        <div id="practice-list">
            <h3 style="margin-top:0;">Vocabulary Practice</h3>
            <div id="vocab-container"></div>
            <button class="primary-btn" onclick="location.reload()" style="width:100%">Back to Menu</button>
        </div>
    </div>

    <div id="win-overlay" class="overlay">
        <div class="pop-box">
            <h2 style="color: var(--secondary);">LEVEL CLEAR!</h2>
            <button class="primary-btn" onclick="showPractice()">Practice Words / תרגול מילים</button>
            <button class="primary-btn" style="background:#edf2f7; color:#4a5568;" onclick="location.reload()">Menu</button>
        </div>
    </div>
