<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Multi-Category Memory Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Andika&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --primary: #6c5ce7; 
            --secondary: #00b894; 
            --bg: #f0f3f7; 
            --card-back: #3498db; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        html, body { overflow: hidden; height: 100%; width: 100%; position: fixed; margin: 0; padding: 0; }
        body { font-family: 'Andika', sans-serif; background-color: var(--bg); display: flex; flex-direction: column; align-items: center; }

        .screen { width: 100%; max-width: 600px; text-align: center; display: flex; flex-direction: column; align-items: center; height: 100%; padding: 10px; }
        .instruction-box { background: white; padding: 12px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin: 5px auto; width: 95%; border-top: 4px solid var(--primary); font-size: 0.9rem; }
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; margin-top: 5px; overflow-y: auto; padding-bottom: 20px; }
        .lvl-btn { padding: 15px 10px; border: none; border-radius: 20px; background: white; box-shadow: 0 6px 12px rgba(0,0,0,0.08); cursor: pointer; font-family: inherit; }
        .lvl-btn b { color: var(--primary); font-size: 1.1rem; display: block; margin-bottom: 2px; text-transform: lowercase; }

        #game-header { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 6px 10px; background: white; border-radius: 18px; margin-bottom: 8px; }
        #game-board { display: grid; gap: 8px; width: 100%; max-height: 82vh; padding: 2px; justify-content: center; grid-template-columns: repeat(4, 1fr); }
        
        /* Optimized Color Grid - 6 columns to prevent cut-off */
        .color-mode #game-board { 
            grid-template-columns: repeat(6, 1fr); 
            gap: 4px; 
        }
        .color-mode .card { border-radius: 6px; }
        .color-mode .visual-box { width: 28px; height: 28px; }
        .color-mode .color-swatch { width: 24px; height: 24px; }
        .color-mode .word { font-size: 0.55rem; margin-top: 1px; }

        .card { aspect-ratio: 1/1.1; background: var(--card-back); border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.4s; position: relative; transform-style: preserve-3d; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; }
        .card .content { display: none; flex-direction: column; align-items: center; width: 100%; pointer-events: none; }
        .card.flipped { background: white; transform: rotateY(180deg); border: 2.5px solid var(--primary); }
        .card.flipped .content { display: flex; transform: rotateY(180deg); }
        .card.matched { background: #f0fff4 !important; border-color: var(--secondary) !important; opacity: 0.4; }

        .emoji { font-size: clamp(1.1rem, 6vw, 2.2rem); }
        .word { font-size: 0.7rem; font-weight: 900; margin-top: 4px; text-transform: lowercase; color: #2d3436; }

        .visual-box { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .color-swatch { width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); }
        
        .gold-metallic { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); }
        .silver-metallic { background: linear-gradient(135deg, #757575, #e0e0e0, #9e9e9e, #f5f5f5, #757575); }

        .shape-draw { width: 28px; height: 28px; }
        .shape-circle { border-radius: 50%; }
        .shape-square { border-radius: 4px; }
        .shape-rectangle { width: 38px; height: 20px; border-radius: 4px; }
        .shape-triangle { width: 0; height: 0; border-left: 14px solid transparent; border-right: 14px solid transparent; border-bottom: 28px solid black; background: none !important; }
        .shape-oval { width: 38px; height: 22px; border-radius: 50%; }
        .shape-heart-flat { background: currentColor; clip-path: polygon(50% 15%, 80% 0%, 100% 20%, 100% 50%, 50% 95%, 0% 50%, 0% 20%, 20% 0%); width: 28px; height: 28px; }

        .stats { display: flex; gap: 4px; }
        .stat-box { background: #f8f9fa; padding: 4px 6px; border-radius: 10px; min-width: 55px; text-align: center; }
        .stat-label { font-size: 0.4rem; color: #718096; display: block; font-weight: bold; }
        .stat-value { font-size: 0.75rem; color: var(--primary); font-weight: 800; }

        .nav-btn { padding: 6px 8px; border: none; border-radius: 12px; cursor: pointer; font-weight: 800; text-align: center; font-size: 0.6rem; font-family: inherit; }
        .back-btn { background: #edf2f7; color: #4a5568; }
        .hint-btn { background: #fef3c7; color: #92400e; }
        .mute-btn { background: #e2e8f0; font-size: 0.9rem; padding: 5px; border-radius: 12px; border: none; cursor: pointer; }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .pop-box { background: white; padding: 25px; border-radius: 25px; text-align: center; width: 100%; max-width: 450px; max-height: 90vh; overflow-y: auto; }
        
        .vocab-table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        .vocab-table td { padding: 8px 4px; border-bottom: 1px solid #eee; vertical-align: middle; }
        .vocab-table b { font-size: 0.95rem; text-transform: lowercase; }
        .spk-btn { background: #f0edff; border: none; padding: 8px; border-radius: 10px; color: var(--primary); cursor: pointer; }
        .primary-btn { background: var(--primary); color: white; width: 100%; padding: 15px; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: 800; cursor: pointer; margin-top: 10px; font-family: inherit; }
    </style>
</head>
<body>

    <div id="main-menu" class="screen">
        <h1>🧠 Memory Game</h1>
        <div class="instruction-box">
            <p style="margin: 0 0 5px 0;">Click the tiles to match the pairs!<br>How fast can you find all the pairs?</p>
            <p dir="rtl" style="font-weight: 600; margin:0;">לַחֲצוּ עַל הָאֲרִיחִים כְּדֵי לְהַתְאִים אֶת הַזּוּגוֹת!</p>
        </div>
        <div class="menu-grid">
            <button class="lvl-btn" onclick="startGame('Animals', 'animals')"><b>animals</b> חַיּוֹת</button>
            <button class="lvl-btn" onclick="startGame('Shapes', 'shapes')"><b>shapes</b> צוּרוֹת</button>
            <button class="lvl-btn" onclick="startGame('School', 'school')"><b>school</b> בֵּית סֵפֶר</button>
            <button class="lvl-btn" onclick="startGame('Colors', 'colors')"><b>colors</b> צְבָעִים</button>
            <button class="lvl-btn" onclick="startGame('Numbers', 'numbers')"><b>numbers</b> מִסְפָּרִים</button>
            <button class="lvl-btn" onclick="startGame('Body Parts', 'body')"><b>body parts</b> חֶלְקֵי גּוּף</button>
            <button class="lvl-btn" onclick="startGame('Emotions', 'emotions')"><b>emotions</b> רְגָשׁוֹת</button>
            <button class="lvl-btn" onclick="startGame('Sport', 'sport')"><b>sport</b> סְפּוֹרְט</button>
        </div>
    </div>

    <div id="game-screen" class="screen" style="display:none;">
        <div id="game-header">
            <button class="nav-btn back-btn" onclick="showMenu()">MENU<br>תַּפְרִיט</button>
            <div class="stats">
                <div class="stat-box"><span class="stat-label">TIME / זְמַן</span><span id="timer" class="stat-value">0</span></div>
                <div class="stat-box"><span class="stat-label">BEST / שִׂיא</span><span id="best-score" class="stat-value">--</span></div>
                <div class="stat-box"><span class="stat-label">SCORE / נִקּוּד</span><span class="stat-value"><span id="score">0</span>/<span id="total-pairs">0</span></span></div>
            </div>
            <div style="display:flex; align-items:center; gap:4px;">
                <button class="nav-btn hint-btn" onclick="useHint()">HINT<br>רֶמֶז</button>
                <button class="mute-btn" id="mute-toggle" onclick="toggleMute()">🔊</button>
            </div>
        </div>
        <div id="game-board"></div>
    </div>

    <div id="start-overlay" class="overlay">
        <div class="pop-box">
            <h2 id="lvl-title">category</h2>
            <p>Ready? / מוּכָנִים?</p>
            <button class="primary-btn" onclick="beginTimer()">START! / הַתְחֵל!</button>
        </div>
    </div>

    <div id="win-overlay" class="overlay">
        <div class="pop-box">
            <h2 style="color: var(--secondary); margin:0;">EXCELLENT! / כָּל הַכָּבוֹד!</h2>
            <table class="vocab-table" id="review-table"></table>
            <button class="primary-btn" style="background:var(--secondary);" onclick="resetGame()">PLAY AGAIN / שַׂחֵק שׁוּב</button>
            <button class="primary-btn" onclick="showMenu()">BACK TO MENU / חֲזָרָה לַתַּפְרִיט</button>
        </div>
    </div>

    <script>
        const categories = {
            animals: [
                {name:'dog', val:'🐶', hb:'כֶּלֶב'}, {name:'cat', val:'🐱', hb:'חָתוּל'}, {name:'mouse', val:'🐭', hb:'עַכְבָּר'}, {name:'rabbit', val:'🐰', hb:'אַרְנָב'}, 
                {name:'lion', val:'🦁', hb:'אַרְיֵה'}, {name:'cow', val:'🐮', hb:'פָּרָה'}, {name:'penguin', val:'🐧', hb:'פִּינְגְּוִין'}, {name:'frog', val:'🐸', hb:'צְפַרְדֵּעַ'},
                {name:'monkey', val:'🐵', hb:'קוֹף'}, {name:'tiger', val:'🐯', hb:'נָמֵר'}
            ],
            shapes: [
                {name:'circle', val:'shape-circle', type:'shape', color:'#fd79a8', hb:'עִגּוּל'}, 
                {name:'square', val:'shape-square', type:'shape', color:'#3498db', hb:'רִבּוּעַ'}, 
                {name:'star', val:'★', type:'text-shape', color:'#f1c40f', hb:'כּוֹכָב'}, 
                {name:'heart', val:'shape-heart-flat', type:'shape', color:'#e74c3c', hb:'לֵב'}, 
                {name:'diamond', val:'◆', type:'text-shape', color:'#9b59b6', hb:'מְעֻיָּן'}, 
                {name:'rectangle', val:'shape-rectangle', type:'shape', color:'#2ecc71', hb:'מַלְבֵּן'}, 
                {name:'triangle', val:'shape-triangle', type:'shape', color:'#e67e22', hb:'מְשֻׁלָּשׁ'}, 
                {name:'oval', val:'shape-oval', type:'shape', color:'#7f8c8d', hb:'אֵלִיפְּסָה'}
            ],
            school: [
                {name:'crayon', val:'🖍️', hb:'צִבְעוֹן'}, {name:'pencil', val:'✏️', hb:'עִפָּרוֹן'}, {name:'pen', val:'🖊️', hb:'עֵט'}, {name:'scissors', val:'✂️', hb:'מִסְפָּרַיִם'}, 
                {name:'ruler', val:'📏', hb:'סַרְגֵּל'}, {name:'book', val:'📖', hb:'סֵפֶר'}, {name:'notebook', val:'📓', hb:'מַחְבֶּרֶת'}, {name:'school bag', val:'🎒', hb:'יַלְקוּט'}
            ],
            colors: [
                {name:'blue', val:'#0984e3', type:'color', hb:'כָּחֹל'}, {name:'red', val:'#d63031', type:'color', hb:'אָדֹם'}, {name:'green', val:'#27ae60', type:'color', hb:'יָרֹק'}, {name:'orange', val:'#e67e22', type:'color', hb:'כָּתֹם'}, 
                {name:'pink', val:'#fd79a8', type:'color', hb:'וָרֹד'}, {name:'purple', val:'#6c5ce7', type:'color', hb:'סָגֹל'}, {name:'black', val:'#2d3436', type:'color', hb:'שָׁחֹר'}, {name:'white', val:'#ffffff', type:'color', hb:'לָבָן'},
                {name:'gray', val:'#7f8c8d', type:'color', hb:'אָפֹר'}, {name:'yellow', val:'#f1c40f', type:'color', hb:'צָהֹב'}, {name:'brown', val:'#795548', type:'color', hb:'חוּם'}, 
                {name:'gold', val:'gold-metallic', type:'special-color', hb:'זָהָב'}, {name:'silver', val:'silver-metallic', type:'special-color', hb:'כֶּסֶף'}, {name:'turquoise', val:'#40e0d0', type:'color', hb:'טוּרְקִיז'}
            ],
            numbers: [
                {name:'one', val:'1', hb:'אֶחָד'}, {name:'two', val:'2', hb:'שְׁתַּיִם'}, {name:'three', val:'3', hb:'שָׁלוֹשׁ'}, {name:'four', val:'4', hb:'אַרְבַּע'}, 
                {name:'five', val:'5', hb:'חָמֵשׁ'}, {name:'six', val:'6', hb:'שֵׁשׁ'}, {name:'seven', val:'7', hb:'שֶׁבַע'}, {name:'eight', val:'8', hb:'שְׁמוֹנֶה'},
                {name:'nine', val:'9', hb:'תֵּשַׁע'}, {name:'ten', val:'10', hb:'עֶשֶׂר'}
            ],
            body: [
                {name:'eyes', val:'👀', hb:'עֵינַיִם'}, {name:'ear', val:'👂', hb:'אֹזֶן'}, {name:'nose', val:'👃', hb:'אַף'}, {name:'hands', val:'🙌', hb:'יָדַיִם'}, 
                {name:'foot', val:'🦶', hb:'כַּף רֶגֶל'}, {name:'leg', val:'🦵', hb:'רֶגֶל'}, {name:'arm', val:'💪', hb:'זְרוֹעַ'}, {name:'tooth', val:'🦷', hb:'שֵׁן'},
                {name:'tongue', val:'👅', hb:'לָשׁוֹן'}, {name:'brain', val:'🧠', hb:'מֹחַ'}
            ],
            emotions: [
                {name:'happy', val:'😀', hb:'שָׂמֵחַ'}, {name:'sad', val:'😢', hb:'עָצוּב'}, {name:'angry', val:'😡', hb:'כּוֹעֵס'}, {name:'tired', val:'🥱', hb:'עָיֵף'},
                {name:'sick', val:'🤒', hb:'חוֹלֶה'}, {name:'excited', val:'🤩', hb:'נִרְגָּשׁ'}, {name:'scared', val:'😨', hb:'מְפֻחָד'}, {name:'surprised', val:'😮', hb:'מֻפְתָּע'}
            ],
            sport: [
                {name:'soccer', val:'⚽', hb:'כַּדּוּרֶגֶל'}, {name:'basketball', val:'🏀', hb:'כַּדּוּרְסַל'}, {name:'tennis', val:'🎾', hb:'טֶנִיס'},
                {name:'baseball', val:'⚾', hb:'בֵּיְסְבּוֹל'}, {name:'football', val:'🏈', hb:'פּוּטְבּוֹל'}, {name:'ping pong', val:'🏓', hb:'פִּינְג פּוֹנְג'}
            ]
        };

        let currentCatKey = 'animals', flippedCards = [], matchedPairs = 0, seconds = 0, timerInterval, canFlip = false, isMuted = false;

        function toggleMute() { isMuted = !isMuted; document.getElementById('mute-toggle').innerText = isMuted ? '🔇' : '🔊'; }
        function speak(text) { if (isMuted) return; window.speechSynthesis.cancel(); const msg = new SpeechSynthesisUtterance(text); msg.lang = 'en-US'; window.speechSynthesis.speak(msg); }
        function showMenu() { location.reload(); }

        function renderVisual(item) {
            if(item.type === 'color') return `<div class="color-swatch" style="background:${item.val}"></div>`;
            if(item.type === 'special-color') return `<div class="color-swatch ${item.val}"></div>`;
            if(item.type === 'shape') {
                const style = item.val === 'shape-triangle' ? `border-bottom-color:${item.color}` : `background:${item.color}; color:${item.color}`;
                return `<div class="shape-draw ${item.val}" style="${style}"></div>`;
            }
            if(item.type === 'text-shape') return `<span style="font-size:1.6rem; color:${item.color}">${item.val}</span>`;
            return `<span class="emoji">${item.val}</span>`;
        }

        function startGame(label, key) { 
            currentCatKey = key;
            const scr = document.getElementById('game-screen');
            scr.className = 'screen ' + (key === 'colors' ? 'color-mode' : '');
            document.getElementById('main-menu').style.display = 'none'; 
            scr.style.display = 'flex'; 
            document.getElementById('lvl-title').innerText = label.toLowerCase();
            document.getElementById('start-overlay').style.display = 'flex';
            setupBoard();
        }

        function beginTimer() { document.getElementById('start-overlay').style.display = 'none'; canFlip = true; timerInterval = setInterval(() => { seconds++; document.getElementById('timer').innerText = seconds; }, 1000); }

        function setupBoard() {
            clearInterval(timerInterval); matchedPairs = 0; seconds = 0; flippedCards = []; canFlip = false;
            const data = categories[currentCatKey];
            document.getElementById('score').innerText = '0';
            document.getElementById('total-pairs').innerText = data.length;
            document.getElementById('timer').innerText = '0';
            const best = localStorage.getItem('best_cat_' + currentCatKey);
            document.getElementById('best-score').innerText = best ? best : '--';
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            const cardsData = [...data, ...data].sort(() => Math.random() - 0.5);
            cardsData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.name = item.name;
                card.innerHTML = `<div class="content"><div class="visual-box">${renderVisual(item)}</div><span class="word">${item.name}</span></div>`;
                card.onclick = () => flipCard(card, item.name);
                board.appendChild(card);
            });
        }

        function flipCard(card, name) {
            if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) return;
            card.classList.add('flipped');
            flippedCards.push(card);
            speak(name);
            if (flippedCards.length === 2) { canFlip = false; checkMatch(); }
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            if (c1.dataset.name === c2.dataset.name) {
                c1.classList.add('matched'); c2.classList.add('matched');
                matchedPairs++;
                document.getElementById('score').innerText = matchedPairs;
                flippedCards = []; canFlip = true;
                if (matchedPairs === categories[currentCatKey].length) { clearInterval(timerInterval); setTimeout(handleWin, 500); }
            } else { setTimeout(() => { c1.classList.remove('flipped'); c2.classList.remove('flipped'); flippedCards = []; canFlip = true; }, 1000); }
        }

        function handleWin() {
            const table = document.getElementById('review-table');
            table.innerHTML = '';
            categories[currentCatKey].forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="width:40px">${renderVisual(item)}</td>
                    <td style="text-align:left"><b>${item.name}</b></td>
                    <td style="text-align:right" dir="rtl">${item.hb}</td>
                    <td style="width:40px"><button class="spk-btn" onclick="speak('${item.name}')">🔊</button></td>
                `;
                table.appendChild(tr);
            });
            document.getElementById('win-overlay').style.display = 'flex'; 
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); 
        }

        function resetGame() { document.getElementById('win-overlay').style.display = 'none'; setupBoard(); beginTimer(); }
        function useHint() {
            if (!canFlip) return;
            seconds += 5; document.getElementById('timer').innerText = seconds;
            const hidden = Array.from(document.querySelectorAll('.card:not(.flipped):not(.matched)'));
            const names = [...new Set(hidden.map(c => c.dataset.name))].sort(() => 0.5 - Math.random()).slice(0, 1);
            const cards = hidden.filter(c => names.includes(c.dataset.name));
            canFlip = false; cards.forEach(c => c.classList.add('flipped'));
            setTimeout(() => { cards.forEach(c => c.classList.remove('flipped')); canFlip = true; }, 1200);
        }
    </script>
</body>
</html>
