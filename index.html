<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Multi-Category Memory Game</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --primary: #6c5ce7; 
            --secondary: #00b894; 
            --bg: #f0f3f7; 
            --card-back: #3498db; 
        }

        /* HARD CSS LOCK for iPhone Zoom */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; 
        }
        
        html, body {
            overflow: hidden;
            height: 100%;
            width: 100%;
            position: fixed;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        .screen { 
            width: 100%; 
            max-width: 600px; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            height: 100%;
            padding: 20px 10px;
        }

        .instruction-box {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin: 15px auto;
            width: 90%;
            border-top: 4px solid var(--primary);
        }

        .menu-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            width: 100%; 
            margin-top: 20px;
        }

        .lvl-btn { 
            padding: 25px 10px; 
            border: none; 
            border-radius: 20px; 
            background: white; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.08); 
            cursor: pointer; 
        }
        .lvl-btn b { color: var(--primary); font-size: 1.3rem; display: block; margin-bottom: 4px; }

        #game-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            width: 100%; 
            padding: 10px 15px; 
            background: white;
            border-radius: 18px;
            margin-bottom: 20px;
        }

        #game-board { 
            display: grid; 
            gap: 8px; 
            width: 100%; 
            max-width: 100%;
        }

        .card { 
            aspect-ratio: 1/1; 
            background: var(--card-back); 
            border-radius: 10px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: transform 0.4s; 
            position: relative; 
            transform-style: preserve-3d; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .card .content { display: none; flex-direction: column; align-items: center; width: 100%; pointer-events: none; }
        .card.flipped { background: white; transform: rotateY(180deg); border: 2.5px solid var(--primary); }
        .card.flipped .content { display: flex; transform: rotateY(180deg); }
        .card.matched { background: #f0fff4 !important; border-color: var(--secondary) !important; opacity: 0.8; }

        .emoji { font-size: clamp(1.2rem, 7vw, 2.5rem); }
        .word { font-size: 0.55rem; font-weight: 900; margin-top: 2px; text-transform: uppercase; color: #2d3436; }

        .stats { display: flex; gap: 6px; }
        .stat-box { background: #f8f9fa; padding: 4px 8px; border-radius: 10px; min-width: 75px; text-align: center; }
        .stat-label { font-size: 0.5rem; color: #718096; display: block; font-weight: bold; }
        .stat-value { font-size: 1rem; color: var(--primary); font-weight: 800; }

        .nav-btn { padding: 10px 14px; border: none; border-radius: 12px; cursor: pointer; font-weight: 800; text-align: center; font-size: 0.7rem; }
        .back-btn { background: #edf2f7; color: #4a5568; }
        .hint-btn { background: #fef3c7; color: #92400e; }
        .mute-btn { background: #e2e8f0; font-size: 1.1rem; padding: 8px; border-radius: 12px; border: none; cursor: pointer; margin-left: 4px; }

        .overlay { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.85); 
            z-index: 1000; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }
        .pop-box { background: white; padding: 30px; border-radius: 25px; text-align: center; width: 100%; max-width: 400px; }
        .primary-btn { 
            background: var(--primary); color: white; width: 100%; padding: 18px; border: none; border-radius: 15px; 
            font-size: 1.4rem; font-weight: 800; cursor: pointer; margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="main-menu" class="screen">
        <h1>🧠 Memory Game</h1>
        <div class="instruction-box">
            <p>Click the tiles to match two of a kind. How fast can you do it?</p>
            <p dir="rtl" style="font-weight: 600;">לחצו על האריחים כדי להתאים שניים מאותו סוג. כמה מהר תוכלו לעשות זאת?</p>
        </div>
        <div class="menu-grid">
            <button class="lvl-btn" onclick="startGame('Animals', 'animals')"><b>Animals</b> חיות</button>
            <button class="lvl-btn" onclick="startGame('Shapes', 'shapes')"><b>Shapes</b> צורות</button>
            <button class="lvl-btn" onclick="startGame('School', 'school')"><b>School</b> בית ספר</button>
            <button class="lvl-btn" onclick="startGame('Colors', 'colors')"><b>Colors</b> צבעים</button>
            <button class="lvl-btn" onclick="startGame('Numbers', 'numbers')"><b>Numbers</b> מספרים</button>
        </div>
    </div>

    <div id="game-screen" class="screen" style="display:none;">
        <div id="game-header">
            <button class="nav-btn back-btn" onclick="showMenu()">MENU<br>תפריט</button>
            <div class="stats">
                <div class="stat-box"><span class="stat-label">TIME / זמן</span><span id="timer" class="stat-value">0</span></div>
                <div class="stat-box"><span class="stat-label">BEST / שיא</span><span id="best-score" class="stat-value">--</span></div>
                <div class="stat-box"><span class="stat-label">SCORE / ניקוד</span><span class="stat-value"><span id="score">0</span>/<span id="total-pairs">8</span></span></div>
            </div>
            <div style="display:flex; align-items:center;">
                <button class="nav-btn hint-btn" onclick="useHint()">HINT<br>רמז</button>
                <button class="mute-btn" id="mute-toggle" onclick="toggleMute()">🔊</button>
            </div>
        </div>
        <div id="game-board"></div>
    </div>

    <div id="start-overlay" class="overlay">
        <div class="pop-box">
            <h2 id="lvl-title">Category</h2>
            <p>Ready to start? / מוכנים להתחיל?</p>
            <button class="primary-btn" onclick="beginTimer()">START! / התחל!</button>
        </div>
    </div>

    <div id="win-overlay" class="overlay">
        <div class="pop-box">
            <h2 style="color: var(--secondary);">EXCELLENT!</h2>
            <p>Time / זמן: <strong><span id="final-time">0</span></strong></p>
            <button class="primary-btn" style="background:var(--secondary);" onclick="resetGame()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (event) => {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) event.preventDefault();
            lastTouchEnd = now;
        }, false);

        const categories = {
            animals: [
                {name:'Dog', emoji:'🐶'}, {name:'Cat', emoji:'🐱'}, {name:'Mouse', emoji:'🐭'}, {name:'Rabbit', emoji:'🐰'}, 
                {name:'Lion', emoji:'🦁'}, {name:'Cow', emoji:'🐮'}, {name:'Penguin', emoji:'🐧'}, {name:'Frog', emoji:'🐸'},
                {name:'Monkey', emoji:'🐵'}, {name:'Tiger', emoji:'🐯'}
            ],
            shapes: [
                {name:'Circle', emoji:'⭕'}, {name:'Square', emoji:'⬜'}, {name:'Star', emoji:'⭐'}, {name:'Heart', emoji:'❤️'}, 
                {name:'Diamond', emoji:'💎'}, {name:'Rectangle', emoji:'▭'}, {name:'Triangle', emoji:'📐'}, {name:'Oval', emoji:'🥚'}
            ],
            school: [
                {name:'Crayon', emoji:'🖍️'}, {name:'Pencil', emoji:'✏️'}, {name:'Pen', emoji:'🖊️'}, {name:'Scissors', emoji:'✂️'}, 
                {name:'Ruler', emoji:'📏'}, {name:'Book', emoji:'📖'}, {name:'Notebook', emoji:'📓'}, {name:'School bag', emoji:'🎒'}
            ],
            colors: [
                {name:'Blue', emoji:'🔵'}, {name:'Red', emoji:'🔴'}, {name:'Green', emoji:'🟢'}, {name:'Orange', emoji:'🟠'}, 
                {name:'Pink', emoji:'🌸'}, {name:'Purple', emoji:'🟣'}, {name:'Black', emoji:'⚫'}, {name:'White', emoji:'⚪'},
                {name:'Grey', emoji:'🔘'}, {name:'Silver', emoji:'🥈'}, {name:'Yellow', emoji:'🟡'}, {name:'Brown', emoji:'🟤'}
            ],
            numbers: [
                {name:'One', emoji:'1️⃣'}, {name:'Two', emoji:'2️⃣'}, {name:'Three', emoji:'3️⃣'}, {name:'Four', emoji:'4️⃣'}, 
                {name:'Five', emoji:'5️⃣'}, {name:'Six', emoji:'6️⃣'}, {name:'Seven', emoji:'7️⃣'}, {name:'Eight', emoji:'8️⃣'},
                {name:'Nine', emoji:'9️⃣'}, {name:'Ten', emoji:'🔟'}
            ]
        };

        let currentCatKey = 'animals', currentCatLabel = 'Animals', flippedCards = [], matchedPairs = 0, seconds = 0, timerInterval, canFlip = false, isMuted = false;

        function toggleMute() { isMuted = !isMuted; document.getElementById('mute-toggle').innerText = isMuted ? '🔇' : '🔊'; }

        function speak(text) {
            if (isMuted) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }

        function startGame(label, key) { 
            currentCatKey = key;
            currentCatLabel = label;
            document.getElementById('main-menu').style.display = 'none'; 
            document.getElementById('game-screen').style.display = 'flex'; 
            document.getElementById('lvl-title').innerText = label;
            document.getElementById('start-overlay').style.display = 'flex';
            setupBoard();
        }

        function beginTimer() {
            document.getElementById('start-overlay').style.display = 'none';
            canFlip = true;
            timerInterval = setInterval(() => { seconds++; document.getElementById('timer').innerText = seconds; }, 1000);
        }

        function setupBoard() {
            clearInterval(timerInterval); matchedPairs = 0; seconds = 0; flippedCards = []; canFlip = false;
            const data = categories[currentCatKey];
            document.getElementById('score').innerText = '0';
            document.getElementById('total-pairs').innerText = data.length;
            document.getElementById('timer').innerText = '0';
            const best = localStorage.getItem('best_cat_' + currentCatKey);
            document.getElementById('best-score').innerText = best ? best : '--';
            
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            board.style.gridTemplateColumns = (data.length <= 8) ? "repeat(4, 1fr)" : "repeat(4, 1fr)";

            const cardsData = [...data, ...data].sort(() => Math.random() - 0.5);
            cardsData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.name = item.name;
                card.innerHTML = `<div class="content"><span class="emoji">${item.emoji}</span><span class="word">${item.name}</span></div>`;
                card.onclick = () => flipCard(card, item.name);
                board.appendChild(card);
            });
        }

        function flipCard(card, name) {
            if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) return;
            card.classList.add('flipped');
            flippedCards.push(card);
            speak(name);
            if (flippedCards.length === 2) { canFlip = false; checkMatch(); }
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            if (c1.dataset.name === c2.dataset.name) {
                c1.classList.add('matched'); c2.classList.add('matched');
                matchedPairs++;
                document.getElementById('score').innerText = matchedPairs;
                flippedCards = []; canFlip = true;
                if (matchedPairs === categories[currentCatKey].length) { clearInterval(timerInterval); handleWin(); }
            } else { setTimeout(() => { c1.classList.remove('flipped'); c2.classList.remove('flipped'); flippedCards = []; canFlip = true; }, 1000); }
        }

        function handleWin() {
            const bestKey = 'best_cat_' + currentCatKey;
            const prev = localStorage.getItem(bestKey);
            if(!prev || seconds < prev) { localStorage.setItem(bestKey, seconds); }
            document.getElementById('final-time').innerText = seconds; 
            document.getElementById('win-overlay').style.display = 'flex'; 
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); 
        }

        function showMenu() { location.reload(); }
        function resetGame() { document.getElementById('win-overlay').style.display = 'none'; setupBoard(); beginTimer(); }

        function useHint() {
            if (!canFlip) return;
            seconds += 5; document.getElementById('timer').innerText = seconds;
            const hidden = Array.from(document.querySelectorAll('.card:not(.flipped):not(.matched)'));
            const names = [...new Set(hidden.map(c => c.dataset.name))].sort(() => 0.5 - Math.random()).slice(0, 1);
            const cards = hidden.filter(c => names.includes(c.dataset.name));
            canFlip = false;
            cards.forEach(c => c.classList.add('flipped'));
            setTimeout(() => { cards.forEach(c => c.classList.remove('flipped')); canFlip = true; }, 1200);
        }
    </script>
</body>
</html>
